<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpsTracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0e18;
  --bg2:     #111520;
  --bg3:     #181d2e;
  --bg4:     #1e2438;
  --border:  #252c42;
  --border2: #2e3754;
  --text:    #eef0f6;
  --muted:   #7880a0;
  --muted2:  #444d6a;
  --accent:  #2c4a8c;
  --accent2: #3d63bf;
  --accent3: #5b82e0;
  --gold:    #f0c040;
  --gold2:   #ffd666;
  --green:   #34c47a;
  --red:     #e05555;
  --orange:  #e07840;
  --teal:    #3dbcb0;
  --shadow:  0 4px 20px rgba(0,0,0,.4);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── LOGIN ── */
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background: radial-gradient(ellipse at 30% 40%, rgba(44,74,140,.15) 0%, transparent 60%), var(--bg); }
.login-card { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:40px; width:100%; max-width:380px; }
.login-brand { font-size:24px; font-weight:900; letter-spacing:-1px; margin-bottom:4px; }
.login-brand span { color:var(--teal); }
.login-tagline { font-size:12px; color:var(--muted); margin-bottom:28px; }
.login-field { margin-bottom:16px; }
.login-label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:6px; }
.login-input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; padding:12px 14px; outline:none; transition:border-color .15s; }
.login-input:focus { border-color:var(--accent2); }
.login-btn { width:100%; background:var(--accent2); color:#fff; border:none; border-radius:10px; font-family:'Inter',sans-serif; font-size:14px; font-weight:800; padding:14px; cursor:pointer; transition:background .15s; margin-top:8px; }
.login-btn:hover { background:var(--accent3); }
.login-err { font-size:12px; color:var(--red); margin-top:10px; display:none; }

/* ── HEADER ── */
header { background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header-inner { max-width:1400px; margin:0 auto; padding:0 28px; display:flex; align-items:center; gap:20px; height:58px; }
.logo { font-size:18px; font-weight:900; letter-spacing:-1px; }
.logo span { color:var(--teal); }
.logo-sep { width:1px; height:20px; background:var(--border2); }
.logo-sub { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.5px; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.btn-logout { background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'Inter',sans-serif; font-size:12px; font-weight:600; padding:6px 14px; cursor:pointer; transition:all .15s; }
.btn-logout:hover { border-color:var(--muted); color:var(--text); }

/* ── LAYOUT ── */
.app-wrap { display:none; flex-direction:column; min-height:100vh; }
.content { max-width:1400px; margin:0 auto; padding:28px 28px 60px; width:100%; }

/* ── FILTER BAR ── */
.filter-bar { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:10px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:20px; position:sticky; top:58px; z-index:90; }
.fb-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--muted2); white-space:nowrap; }
.fb-select { background:var(--bg4); border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:11px; font-weight:700; padding:4px 8px; border-radius:7px; cursor:pointer; outline:none; }
.fb-select.active { border-color:var(--accent2); color:#fff; }
.fb-input { background:var(--bg4); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:'Inter',sans-serif; font-size:11px; padding:5px 10px; outline:none; width:200px; }
.fb-input:focus { border-color:var(--accent2); }
.filter-sep { width:1px; height:20px; background:var(--border2); flex-shrink:0; }
.fb-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-left:auto; }

/* ── TICKET LIST ── */
.ticket-grid { display:flex; flex-direction:column; gap:12px; }
.ticket-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:18px 20px; cursor:pointer; transition:border-color .15s, transform .15s; }
.ticket-card:hover { border-color:var(--border2); transform:translateY(-1px); }
.ticket-card.expanded { border-color:var(--accent2); }
.tc-header { display:flex; align-items:flex-start; gap:12px; }
.tc-entity { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; padding:3px 8px; border-radius:20px; flex-shrink:0; margin-top:2px; }
.tc-entity.tecspal { background:rgba(61,99,191,.2); color:var(--accent3); }
.tc-entity.quipteams { background:rgba(61,188,176,.2); color:var(--teal); }
.tc-main { flex:1; min-width:0; }
.tc-name { font-size:14px; font-weight:700; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.tc-date { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.tc-country { font-size:11px; font-weight:700; background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:1px 6px; }
.tc-pipeline { font-size:11px; color:var(--muted); }
.tc-status { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
.tc-status.ganado { background:rgba(52,196,122,.15); color:var(--green); }
.tc-status.proceso { background:rgba(240,192,64,.15); color:var(--gold); }
.tc-status.perdido { background:rgba(224,85,85,.15); color:var(--red); }
.tc-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.tc-items-preview { font-size:11px; color:var(--teal); font-weight:600; }

/* ── EXPANDED DETAIL ── */
.tc-detail { display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
.tc-detail.open { display:block; }
.tc-items { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.item-row { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
.item-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.item-qty { font-size:12px; font-weight:800; color:var(--gold); font-family:'JetBrains Mono',monospace; }
.item-name { font-size:13px; font-weight:700; }
.item-specs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.spec-tag { font-size:10px; font-weight:700; background:var(--bg4); border:1px solid var(--border); border-radius:4px; padding:2px 8px; color:var(--muted); }
.spec-tag.highlight { border-color:var(--accent2); color:var(--accent3); }

/* ── SUPPLIER SUGGESTIONS ── */
.suppliers-title { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--muted2); margin-bottom:8px; }
.supplier-list { display:flex; flex-direction:column; gap:6px; }
.supplier-row { display:flex; align-items:center; gap:10px; background:var(--bg4); border:1px solid var(--border); border-radius:8px; padding:10px 14px; }
.sup-rank { font-size:11px; font-weight:800; font-family:'JetBrains Mono',monospace; color:var(--muted2); min-width:20px; }
.sup-name { font-size:12px; font-weight:700; flex:1; }
.sup-stats { display:flex; gap:12px; }
.sup-stat { display:flex; flex-direction:column; align-items:flex-end; }
.sup-stat-val { font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.sup-stat-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.sup-badge { font-size:9px; font-weight:700; padding:2px 6px; border-radius:20px; }
.sup-badge.best { background:rgba(52,196,122,.15); color:var(--green); }
.sup-badge.recent { background:rgba(61,99,191,.15); color:var(--accent3); }
.sup-badge.frequent { background:rgba(240,192,64,.15); color:var(--gold); }
.no-suppliers { font-size:12px; color:var(--muted2); padding:12px 0; font-style:italic; }

/* ── LOADING ── */
.loading { text-align:center; padding:60px; color:var(--muted); }
.loading-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent2); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── EMPTY ── */
.empty { text-align:center; padding:60px; color:var(--muted2); }
.empty-icon { font-size:36px; margin-bottom:12px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-brand">Ops<span>Tracking</span></div>
    <div class="login-tagline">Seguimiento de pedidos · Sugerencias de proveedores</div>
    <div class="login-field">
      <label class="login-label" for="loginUser">Usuario</label>
      <input class="login-input" id="loginUser" type="text" placeholder="usuario" autocomplete="username">
    </div>
    <div class="login-field">
      <label class="login-label" for="loginPass">Contraseña</label>
      <input class="login-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">Ingresar</button>
    <div class="login-err" id="loginErr">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div class="app-wrap" id="appWrap">
  <header>
    <div class="header-inner">
      <div class="logo">Ops<span>Tracking</span></div>
      <div class="logo-sep"></div>
      <div class="logo-sub">SEGUIMIENTO DE PEDIDOS</div>
      <div class="header-right">
        <a href="opsdesk.html" style="color:var(--muted);font-size:12px;text-decoration:none;font-weight:600;border:1px solid var(--border);border-radius:8px;padding:6px 14px;">← OpsDesk</a>
        <button class="btn-logout" id="logoutBtn">Salir</button>
      </div>
    </div>
  </header>

  <div class="content">
    <div class="filter-bar" id="filterBar">
      <span class="fb-label">Entidad</span>
      <select class="fb-select" id="fEntity">
        <option value="">Todas</option>
        <option value="tecspal">Tecspal</option>
        <option value="quipteams">Quipteams</option>
      </select>
      <div class="filter-sep"></div>
      <span class="fb-label">Mes</span>
      <select class="fb-select" id="fMonth">
        <option value="">Todos</option>
        <option value="2026-03">Mar 2026</option>
        <option value="2026-02">Feb 2026</option>
        <option value="2026-01">Ene 2026</option>
        <option value="2025-12">Dic 2025</option>
        <option value="2025-11">Nov 2025</option>
        <option value="2025-10">Oct 2025</option>
        <option value="2025-09">Sep 2025</option>
        <option value="2025-08">Ago 2025</option>
        <option value="2025-07">Jul 2025</option>
      </select>
      <div class="filter-sep"></div>
      <span class="fb-label">Buscar</span>
      <input class="fb-input" id="fSearch" type="text" placeholder="cliente, equipo, país…">
      <div class="filter-sep"></div>
      <span class="fb-label">Con pedido</span>
      <select class="fb-select" id="fHasNotes">
        <option value="">Todos</option>
        <option value="yes">Con notas</option>
        <option value="no">Sin notas</option>
      </select>
      <span class="fb-count" id="ticketCount">—</span>
    </div>

    <div id="ticketList"><div class="loading"><div class="loading-spinner"></div>Cargando...</div></div>
  </div>
</div>

<script>
const SB_URL = 'https://mjvgqzpjqofokienuyfl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qdmdxenBqcW9mb2tpZW51eWZsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzY4MDAwOSwiZXhwIjoyMDg5MjU2MDA5fQ._Je4jvIl-QbSTPgGWmyc8gPxXLeVSpdIrypiCbxWqz0';

const USERS = [
  { user:'viewer',  pass:'ops2025',     level:1 },
  { user:'admin',   pass:'tecspal2025', level:2 },
  { user:'gonzalo', pass:'Gonzalo1',    level:3 },
];

let allTickets = [];
let allVentas  = [];
let filtered   = [];

// ── LOGIN ──────────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const match = USERS.find(x => x.user===u && x.pass===p);
  if (match) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'flex';
    loadData();
  } else {
    const err = document.getElementById('loginErr');
    err.style.display = 'block';
    setTimeout(()=>err.style.display='none', 3000);
  }
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
});

// ── LOAD DATA ─────────────────────────────────────────────────────
async function sbGet(table, params={}) {
  const PAGE = 1000; let all = [], from = 0;
  const p = {...params}; delete p.limit;
  while(true) {
    const qs = new URLSearchParams(p).toString();
    const url = `${SB_URL}/rest/v1/${table}${qs?'?'+qs:''}`;
    const res = await fetch(url, {
      headers: { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`, 'Range':`${from}-${from+PAGE-1}`, 'Prefer':'count=none' }
    });
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
    const batch = await res.json();
    if (!Array.isArray(batch)||!batch.length) break;
    all = all.concat(batch);
    if (batch.length < PAGE) break;
    from += PAGE;
  }
  return all;
}

async function loadData() {
  document.getElementById('ticketList').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Cargando tickets y ventas...</div>';
  try {
    [allTickets, allVentas] = await Promise.all([
      sbGet('tickets', { select:'*', created_at:'gte.2025-07-01', order:'created_at.desc' }),
      sbGet('ventas',  { select:'razon_social_proveedor,concepto,usd_total_compra,usd_compra,qty,fam,mes,entidad', order:'mes.desc' }),
    ]);
    // Set default filter to current month
    document.getElementById('fMonth').value = '2026-03';
    applyFilters();
    bindFilters();
  } catch(e) {
    document.getElementById('ticketList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Error cargando datos: ${e.message}</div>`;
  }
}

// ── FILTERS ───────────────────────────────────────────────────────
function bindFilters() {
  ['fEntity','fMonth','fSearch','fHasNotes'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener(id==='fSearch'?'input':'change', applyFilters);
  });
}

function applyFilters() {
  const entity   = document.getElementById('fEntity').value;
  const month    = document.getElementById('fMonth').value;
  const search   = document.getElementById('fSearch').value.toLowerCase().trim();
  const hasNotes = document.getElementById('fHasNotes').value;

  filtered = allTickets.filter(t => {
    if (entity && t.entity !== entity) return false;
    if (month && !(t.created_at||'').startsWith(month)) return false;
    if (hasNotes === 'yes' && !t.notes) return false;
    if (hasNotes === 'no' && t.notes) return false;
    if (search) {
      const hay = `${t.name} ${t.country_code} ${t.notes||''}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('ticketCount').textContent = `${filtered.length} tickets`;
  renderList();
}

// ── RENDER LIST ───────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('ticketList');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Sin tickets para los filtros seleccionados</div>';
    return;
  }
  el.innerHTML = '<div class="ticket-grid" id="ticketGrid"></div>';
  const grid = document.getElementById('ticketGrid');
  filtered.slice(0, 200).forEach(t => {
    const card = buildTicketCard(t);
    grid.appendChild(card);
  });
}

function buildTicketCard(t) {
  const div = document.createElement('div');
  div.className = 'ticket-card';
  div.dataset.id = t.task_id;

  const date = (t.created_at||'').substring(0,10);
  const statusClass = t.status==='Negocio Ganado'?'ganado':t.status==='Negocio Perdido'?'perdido':'proceso';
  const statusLabel = t.status==='Negocio Ganado'?'Ganado':t.status==='Negocio Perdido'?'Perdido':'En proceso';

  const items = t.notes ? parseItems(t.notes, t.entity) : [];
  const itemsPreview = items.length ? `${items.length} equipo${items.length>1?'s':''} detectado${items.length>1?'s':''}` : (t.notes ? '1 pedido' : 'Sin notas');

  div.innerHTML = `
    <div class="tc-header">
      <span class="tc-entity ${t.entity}">${t.entity==='tecspal'?'Tecspal':'Quipteams'}</span>
      <div class="tc-main">
        <div class="tc-name">${t.name||'—'}</div>
        <div class="tc-meta">
          <span class="tc-date">${date}</span>
          ${t.country_code?`<span class="tc-country">${t.country_code}</span>`:''}
          ${t.pipeline?`<span class="tc-pipeline">${t.pipeline}</span>`:''}
          <span class="tc-status ${statusClass}">${statusLabel}</span>
        </div>
      </div>
      <div class="tc-right">
        <span class="tc-items-preview">${itemsPreview}</span>
        <span style="font-size:11px;color:var(--muted)">${t.notes?'▼ Ver sugerencias':'▼ Expandir'}</span>
      </div>
    </div>
    <div class="tc-detail" id="detail-${t.task_id}"></div>`;

  div.addEventListener('click', () => toggleDetail(t, div));
  return div;
}

function toggleDetail(t, card) {
  const detail = document.getElementById(`detail-${t.task_id}`);
  const isOpen = detail.classList.contains('open');
  // Close all
  document.querySelectorAll('.tc-detail.open').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.ticket-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if (!isOpen) {
    detail.classList.add('open');
    card.classList.add('expanded');
    if (!detail.dataset.loaded) {
      renderDetail(t, detail);
      detail.dataset.loaded = '1';
    }
  }
}

// ── DETAIL + SUGGESTIONS ─────────────────────────────────────────
function renderDetail(t, el) {
  const items = t.notes ? parseItems(t.notes, t.entity) : [];

  if (!t.notes) {
    el.innerHTML = `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px">
        <div style="font-size:12px;color:var(--muted2);font-style:italic">Este ticket no tiene notas de pedido. Las sugerencias de proveedor aparecen automáticamente cuando se carga el CSV con el campo Notes poblado.</div>
      </div>`;
    return;
  }

  const itemsHtml = items.map((item, idx) => {
    const suppliers = getSuggestions(item);
    return `
      <div class="item-row">
        <div class="item-header">
          <span class="item-qty">${item.qty}x</span>
          <span class="item-name">${item.description}</span>
        </div>
        ${item.specs.length ? `<div class="item-specs">${item.specs.map(s=>`<span class="spec-tag highlight">${s}</span>`).join('')}</div>` : ''}
        <div class="suppliers-title">Proveedores sugeridos</div>
        ${renderSuppliers(suppliers)}
      </div>`;
  }).join('');

  el.innerHTML = `
    <div style="margin-bottom:10px;font-size:11px;color:var(--muted)">
      <strong style="color:var(--muted)">Pedido completo:</strong>
      <pre style="margin-top:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:10px;white-space:pre-wrap;max-height:180px;overflow-y:auto;color:var(--muted)">${escHtml(t.notes)}</pre>
    </div>
    <div class="tc-items">${itemsHtml}</div>`;
}

function renderSuppliers(suppliers) {
  if (!suppliers.length) return `<div class="no-suppliers">Sin historial de compra para este equipo. Verificar manualmente.</div>`;
  return `<div class="supplier-list">${suppliers.map((s,i)=>{
    const badges = [];
    if (i===0) badges.push('<span class="sup-badge best">Mejor precio</span>');
    if (s.isRecent) badges.push('<span class="sup-badge recent">Reciente</span>');
    if (s.isFrequent) badges.push('<span class="sup-badge frequent">Frecuente</span>');
    return `
      <div class="supplier-row">
        <span class="sup-rank">${String(i+1).padStart(2,'0')}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="sup-name">${s.name}</span>
            ${badges.join('')}
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${s.txns} transacciones · última: ${s.lastMonth}</div>
        </div>
        <div class="sup-stats">
          <div class="sup-stat">
            <span class="sup-stat-val" style="color:var(--teal)">$${fmtN(s.avgPrice)}</span>
            <span class="sup-stat-lbl">Precio prom.</span>
          </div>
          <div class="sup-stat">
            <span class="sup-stat-val">${s.totalUnits}</span>
            <span class="sup-stat-lbl">Unidades</span>
          </div>
        </div>
      </div>`;
  }).join('')}</div>`;
}

// ── PARSER ────────────────────────────────────────────────────────
function parseItems(notes, entity) {
  const items = [];
  if (!notes) return items;

  if (entity === 'tecspal') {
    // Format: "1X BRAND MODEL RAM PROC STORAGE"
    // Lines after Order Number header, before Employee Info
    const lines = notes.split('\n');
    for (const line of lines) {
      const m = line.trim().match(/^(\d+)[Xx]\s+(.+)/);
      if (m) {
        const qty = parseInt(m[1]);
        const desc = m[2].trim();
        if (desc.toLowerCase().startsWith('any ')) continue; // skip "ANY As agreed"
        items.push({ qty, description: desc, specs: extractSpecs(desc) });
      }
    }
  } else {
    // Quipteams: items inside -----Quote------  block
    const quoteMatch = notes.match(/-----Quote------([\s\S]*?)(?:-----Confirmed------|$)/);
    if (!quoteMatch) return items;
    const quoteBlock = quoteMatch[1];
    const lines = quoteBlock.split('\n');
    let current = null;
    for (const line of lines) {
      const mItem = line.trim().match(/^(\d+)[Xx]\s+(.+)/i);
      if (mItem) {
        if (current) items.push(current);
        current = { qty: parseInt(mItem[1]), description: mItem[2].trim(), specs: [] };
      } else if (current && line.trim().match(/^(Specific Model|Brands|Type):/i)) {
        const val = line.trim().replace(/^[^:]+:\s*/, '');
        if (val) current.specs.push(val);
      }
    }
    if (current) items.push(current);
    // Extract specs from description
    items.forEach(item => {
      item.specs = [...item.specs, ...extractSpecs(item.description)].filter((v,i,a)=>a.indexOf(v)===i);
    });
  }
  return items;
}

function extractSpecs(desc) {
  const specs = [];
  // RAM: 16GB, 32GB, etc
  const ram = desc.match(/\b(\d+)\s*GB\s*RAM\b/i) || desc.match(/\b(RAM:\s*\d+\s*GB)\b/i) || desc.match(/\b(\d+GB)\b(?=.*storage|\s*RAM|\s*i[0-9]|\s*Intel|\s*AMD|\s*M[0-9])/i);
  if (ram) specs.push(ram[1]);
  // Storage: 512GB, 1TB
  const st = desc.match(/\b(\d+\s*(?:GB|TB))\b(?=.*(?:SSD|storage|NVMe|HDD)|\s*$)/i);
  if (st && !specs.includes(st[1])) specs.push(st[1]);
  // Processor hints
  const proc = desc.match(/\b(M[1-4](?:\s+(?:Pro|Max|Ultra))?|Intel Core i[3579]|Intel Core Ultra \d+|Ryzen \d+|i[3579]-\d+)\b/i);
  if (proc) specs.push(proc[1]);
  return specs.filter(Boolean);
}

// ── SUPPLIER SUGGESTIONS ─────────────────────────────────────────
function getSuggestions(item) {
  if (!allVentas.length) return [];
  const query = normalizeQuery(item.description);
  const MONTHS_ORDER = ['2026-03','2026-02','2026-01','2025-12','2025-11','2025-10','2025-09','2025-08','2025-07'];

  // Score each ventas row
  const provMap = {};
  for (const v of allVentas) {
    const concepto = (v.concepto||'').toLowerCase();
    const score = matchScore(concepto, query);
    if (score < 1) continue;
    const prov = v.razon_social_proveedor || 'Sin proveedor';
    const comp = v.usd_total_compra || v.usd_compra || 0;
    if (!provMap[prov]) provMap[prov] = { name:prov, totalComp:0, units:0, txns:0, months:new Set() };
    provMap[prov].totalComp += comp;
    provMap[prov].units += v.qty||1;
    provMap[prov].txns++;
    if (v.mes) provMap[prov].months.add(v.mes);
  }

  const results = Object.values(provMap)
    .filter(p=>p.txns>0)
    .map(p=>({
      name: p.name,
      avgPrice: p.units>0 ? p.totalComp/p.units : 0,
      totalUnits: p.units,
      txns: p.txns,
      lastMonth: [...p.months].sort().reverse()[0] || '—',
      isRecent: [...p.months].some(m=>m>='2026-01'),
      isFrequent: p.txns >= 3,
    }))
    .sort((a,b) => a.avgPrice - b.avgPrice) // cheapest first
    .slice(0, 5);

  return results;
}

function normalizeQuery(desc) {
  return desc.toLowerCase()
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ').trim()
    .split(' ')
    .filter(w=>w.length>2 && !['and','the','for','with','type','brands','model','specific'].includes(w));
}

function matchScore(concepto, queryWords) {
  let score = 0;
  for (const w of queryWords) {
    if (concepto.includes(w)) score++;
  }
  return score;
}

// ── UTILS ─────────────────────────────────────────────────────────
function fmtN(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(0)+'K';
  return Math.round(n).toLocaleString();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
